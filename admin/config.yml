backend:
  name: github
  repo: rcmichel23/godsentmeheretorockyou
  branch: main

media_folder: "images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
