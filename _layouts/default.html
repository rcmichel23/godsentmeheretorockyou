<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>god sent me here to rock you</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.75;
      display: flex;
      min-height: 100vh;
    }
    a { color: #111; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 150px;
      height: 100vh;
      padding: 28px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fff;
      z-index: 10;
    }
    #sidebar img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .sidebar-tagline {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
      margin-top: -6px;
      white-space: nowrap;
    }
    #sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }
    #sidebar nav a {
      font-size: 14px;
      color: #888;
    }
    #sidebar nav a:hover { color: #111; text-decoration: none; }
    #sidebar nav a.active { color: #111; }
    #main {
      margin-left: 150px;
      flex: 1;
      padding: 56px 72px 100px;
      max-width: 800px;
    }
    .post { margin-bottom: 52px; }
    .post-date { font-size: 14px; color: #bbb; margin-bottom: 6px; }
    .post h2 { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    .post-body { font-size: 14px; color: #333; max-width: 540px; }
    .post-body p { margin-bottom: 10px; }
    .post-body img { max-width: 100%; display: block; margin: 12px 0; }
    .post-body iframe { width: 100%; max-width: 540px; aspect-ratio: 16/9; border: none; display: block; margin: 12px 0; }
    .post-tags { margin-top: 10px; font-size: 14px; color: #ccc; }
    .post-tags span { margin-right: 10px; }
    .post-tags span::before { content: "#"; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .gallery-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .empty { font-size: 14px; color: #ccc; padding: 48px 0; }
    @media (max-width: 640px) {
      body { flex-direction: column; }
      #sidebar { position: relative; width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; align-items: center; padding: 16px; gap: 16px; }
      #sidebar nav { flex-direction: row; gap: 12px; }
      #main { margin-left: 0; padding: 28px 20px 64px; }
    }
  </style>
</head>
<body>
  <aside id="sidebar">
    <img src="/pic.jpeg" alt="photo" />
    <p class="sidebar-tagline">a place for me to play</p>
    <nav>
      <a href="/" class="{% if page.url == '/' %}active{% endif %}">blog</a>
      <a href="/gallery/" class="{% if page.url contains 'gallery' %}active{% endif %}">gallery</a>
      <a href="/videos/" class="{% if page.url contains 'videos' %}active{% endif %}">videos</a>
    </nav>
  </aside>
  <main id="main">
    {{ content }}
  </main>
</body>
</html>
